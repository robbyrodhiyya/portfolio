<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Robby's Portfolio</title>

    <script>
      (function () {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/contact.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <script src="js/app.js"></script>
  </head>
  <body>
    <header class="navbar-container">
      <div class="logo"></div>
      <nav class="nav-list">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="experience.html">Experience</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-section contact-section">
        <h1 class="page-title">Contact</h1>
        <p class="contact-subtitle">Interested in collaborating or have an opportunity to share? Send me a message below.</p>

        <form class="contact-form" action="mailto:robby.rodhiyya@gmail.com" method="get" enctype="text/plain">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. John Doe" required />
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="e.g. Collaboration Opportunity" required />
          </div>

          <div class="form-group">
            <label for="body">Message</label>
            <textarea id="body" name="body" rows="6" placeholder="Tell me about the opportunity, project, or anything you'd like to discuss..." required></textarea>
          </div>

          <button type="submit" class="submit-btn">
            <i class="fas fa-paper-plane"></i> Send Message
          </button>
        </form>

        <div class="contact-alternative">
          <p>Or reach me directly through:</p>
          <div class="contact-links">
            <a href="https://id.linkedin.com/in/robbyrodhiyya" target="_blank">
              <i class="fab fa-linkedin-in"></i> LinkedIn
            </a>
            <a href="https://github.com/robbyrodhiyya" target="_blank">
              <i class="fab fa-github"></i> GitHub
            </a>
            <a href="https://instagram.com/robbyrodhiyya" target="_blank">
              <i class="fab fa-instagram"></i> Instagram
            </a>
          </div>
        </div>
      </section>

      <aside>
        <div class="social-media">
          <ul>
            <li>
              <a href="https://id.linkedin.com/in/robbyrodhiyya" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            </li>
            <li>
              <a href="https://github.com/robbyrodhiyya" target="_blank"><i class="fab fa-github"></i></a>
            </li>
            <li>
              <a href="https://instagram.com/robbyrodhiyya" target="_blank"><i class="fab fa-instagram"></i></a>
            </li>
          </ul>
        </div>
      </aside>
    </main>

    <!-- Floating Buttons -->
    <button id="dark-mode-btn" title="Toggle Dark Mode"></button>
    <button id="back-to-top-btn" title="Back to Top"><i class="fas fa-chevron-up"></i></button>
  </body>
</html>
